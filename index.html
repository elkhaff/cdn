<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator & Reader</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>QR Code Generator & Reader</h1>
            <button class="theme-switch" id="themeToggle">
                <i class="fas fa-sun"></i>
                <span class="theme-switch-text">Light Mode</span>
            </button>
        </div>

        <div class="tab-container">
            <div class="tab active" onclick="switchTab('generate')">
                <i class="fas fa-qrcode"></i>
                Generate QR
            </div>
            <div class="tab" onclick="switchTab('scan')">
                <i class="fas fa-camera"></i>
                Scan QR
            </div>
        </div>

        <div id="generateContent" class="content card active">
            <div class="input-group">
                <input type="text" id="text" placeholder="Masukkan teks atau URL">
            </div>
            <div class="button-group">
                <button onclick="generateQR()" id="generateBtn" class="primary-btn">
                    <i class="fas fa-magic"></i>
                    Generate QR Code
                    <span id="generateLoading" class="loading" style="display: none;"></span>
                </button>
                <button onclick="downloadQR()" id="downloadBtn" class="secondary-btn" style="display: none;">
                    <i class="fas fa-download"></i>
                    Download QR Code
                </button>
            </div>
            <div id="qrcode"></div>
        </div>

        <div id="scanContent" class="content card">
            <div id="reader"></div>
            <div id="result"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
